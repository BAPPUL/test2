<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow TV Premium Sudoku</title>
    
    <meta property="og:title" content="멜로우TV 스도쿠" />
    <meta property="og:description" content="기상천외한 스도쿠를 웹게임으로! 지금 바로 랭킹에 도전해보세요." />
    <meta property="og:image" content="https://postimg.cc/t1drcXXX/image.png" /> 
    <meta property="og:url" content="https://www.bappul.kro.kr/" />
    <meta property="og:type" content="website" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #1a102f;
            --mellow-light-purple: #D6BCFA;
            --mellow-deep-purple: #6B46C1;
            --mellow-yellow: #FFD700;
            --highlight-cross: #F3E8FF; 
            --highlight-match: #FEFCBF; 
            --selected-color: #B794F4;
            --success-green: #2ED573;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #3c236e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        /* [PC 모드 기본값] 넓고 안정적인 데스크톱 레이아웃 설정 */
        .game-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: row;
            gap: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board-container {
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid var(--mellow-light-purple);
        }

        /* PC 모드에서의 고정 셀 크기 */
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 55px);
            grid-template-rows: repeat(9, 55px);
            background-color: var(--mellow-deep-purple);
            gap: 1px;
            border: 3px solid var(--mellow-deep-purple);
        }

        .cell {
            background: white;
            position: relative;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.1s;
        }

        .cell-value {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #2D3748;
            z-index: 2;
        }

        .memo-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 2px;
            z-index: 1;
        }

        .memo-digit {
            font-size: 10px;
            color: #718096;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell.border-right-thick { border-right: 3px solid var(--mellow-deep-purple); }
        .cell.border-bottom-thick { border-bottom: 3px solid var(--mellow-deep-purple); }
        
        .cell.cross-hl { background-color: var(--highlight-cross); }
        .cell.match-hl { background-color: var(--highlight-match) !important; }
        .cell.selected { background-color: var(--selected-color) !important; }
        .cell.selected .cell-value { color: white !important; }
        .cell.fixed { background: #FAF5FF; }
        .cell.fixed .cell-value { color: var(--mellow-deep-purple); }
        .cell.error { background-color: #FFF5F5; }
        .cell.error .cell-value { color: #E53E3E !important; }

        /* PC 우측 컨트롤 패널 영역 */
        .control-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
        }

        .header-logo {
            color: var(--mellow-light-purple);
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 12px rgba(214, 188, 250, 0.4);
            letter-spacing: 1px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            color: #E9D8FD;
            font-size: 18px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(214, 188, 250, 0.2);
            padding-bottom: 10px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--mellow-light-purple);
            cursor: pointer;
            font-size: 13px;
            user-select: none;
            -webkit-user-select: none;
        }
        .action-btn i {
            background: rgba(214, 188, 250, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 5px;
            border: 1px solid rgba(214, 188, 250, 0.2);
        }
        .action-btn:hover i, .action-btn.active i { background: var(--mellow-deep-purple); color: white; }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .num-btn {
            background: rgba(214, 188, 250, 0.15);
            border: 1px solid rgba(214, 188, 250, 0.2);
            height: 70px;
            border-radius: 10px;
            color: #E9D8FD;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .num-btn:hover { background: var(--mellow-deep-purple); color: white; }
        .num-btn.completed { background: var(--success-green); color: white; }

        .bottom-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .new-game-btn, .rank-btn {
            flex: 1;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(107, 70, 193, 0.4);
            -webkit-tap-highlight-color: transparent;
        }
        .new-game-btn { background: linear-gradient(135deg, #B794F4 0%, var(--mellow-deep-purple) 100%); }
        .rank-btn { background: linear-gradient(135deg, #FFD700 0%, #D4AF37 100%); color: #1a102f; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: #251842;
            border: 2px solid var(--mellow-light-purple);
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 480px;
            color: white;
            text-align: center;
            box-shadow: 0 0 30px rgba(214, 188, 250, 0.3);
        }
        .modal h2 { margin-top: 0; color: var(--mellow-yellow); font-size: 22px; }
        .rank-list { margin: 20px 0; text-align: left; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .rank-item:first-child { color: var(--mellow-yellow); font-weight: bold; }
        .rank-info { display: flex; gap: 10px; font-size: 13px; color: #cbd5e1; align-items: center; }
        .rank-time { color: #fff; font-weight: bold; }
        .close-btn { background: var(--mellow-deep-purple); border: none; color: white; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        /* --- 📱 [미디어 쿼리] 가로가 좁은 모바일 화면 전용 세팅 (PC 세팅을 방해하지 않음) --- */
        @media (max-width: 850px) {
            body {
                width: 100vw;
                height: 100vh;
                height: -webkit-fill-available;
                overflow: hidden; /* 모바일에서 스크롤 완벽 차단 */
                padding: 8px;
            }

            .game-container {
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 10px;
                border-radius: 12px;
                height: 100%;
                max-height: 100vh;
            }

            .board-container {
                padding: 4px;
            }

            /* 모바일 화면 높이(vh)와 너비(vw) 중 작은 쪽에 반응하여 스크롤 유발을 원천 봉쇄 */
            .grid {
                grid-template-columns: repeat(9, min(45px, 9.8vw, 4.6vh));
                grid-template-rows: repeat(9, min(45px, 9.8vw, 4.6vh));
                border: 2px solid var(--mellow-deep-purple);
            }

            .cell-value {
                font-size: min(22px, 5.5vw, 2.6vh);
            }

            .memo-digit {
                font-size: min(9px, 2.2vw, 1.1vh);
            }

            .control-panel {
                width: 100%;
                max-width: 100%;
                justify-content: flex-start;
            }

            .header-logo {
                text-align: center;
                margin-bottom: 4px;
                font-size: 18px;
            }

            .stats-bar {
                font-size: 14px;
                margin-bottom: 6px;
                padding-bottom: 4px;
            }

            .action-buttons {
                margin-bottom: 8px;
                gap: 4px;
            }

            .action-btn {
                font-size: 11px;
            }

            .action-btn i {
                width: min(42px, 11vw, 5.2vh);
                height: min(42px, 11vw, 5.2vh);
                font-size: 16px;
                margin-bottom: 2px;
            }

            .numpad {
                gap: 8px;
            }

            .num-btn {
                height: min(54px, 12.5vw, 6.0vh);
                font-size: 22px;
                border-radius: 8px;
            }

            .bottom-buttons {
                margin-top: 8px;
                gap: 8px;
            }

            .new-game-btn, .rank-btn {
                padding: 10px;
                font-size: 14px;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-section">
        <div class="board-container">
            <div class="grid" id="sudoku-grid"></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="header-logo">💫 MELLOW TV SUDOKU</div>
        
        <div class="stats-bar">
            <span>실수: <span id="mistake-count">0/3</span></span>
            <span>힌트: <span id="hint-stats">3/3</span></span>
            <span>시간: <span id="timer">00:00</span></span>
        </div>

        <div class="action-buttons">
            <div class="action-btn" onclick="eraseCell()"><i class="fa-solid fa-eraser"></i>지우기</div>
            <div class="action-btn" id="memo-toggle-btn" onclick="toggleMemo()"><i class="fa-solid fa-pencil"></i>메모 <span id="memo-status">OFF</span></div>
            <div class="action-btn" onclick="useHint()"><i class="fa-solid fa-lightbulb"></i>힌트</div>
            <div class="action-btn" onclick="resetBoard()"><i class="fa-solid fa-rotate"></i>초기화</div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
        </div>

        <div class="bottom-buttons">
            <button class="new-game-btn" onclick="startNewGame()">새 게임</button>
            <button class="rank-btn" onclick="showLeaderboard()">🏆 랭킹 보기</button>
        </div>
    </div>
</div>

<div id="rankModal" class="modal">
    <div class="modal-content">
        <h2>🏆 실시간 명예의 전당</h2>
        <div class="rank-list" id="rank-list-box"></div>
        <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
</div>
