<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow TV Premium Sudoku</title>
    
    <meta property="og:title" content="멜로우TV 스도쿠" />
    <meta property="og:description" content="기상천외한 스도쿠를 웹게임으로! 지금 바로 랭킹에 도전해보세요." />
    <meta property="og:image" content="https://postimg.cc/t1drcXXX/image.png" /> 
    <meta property="og:url" content="https://www.bappul.kro.kr/" />
    <meta property="og:type" content="website" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #1a102f;
            --mellow-light-purple: #D6BCFA;
            --mellow-deep-purple: #6B46C1;
            --mellow-yellow: #FFD700;
            --highlight-cross: #F3E8FF; 
            --highlight-match: #FEFCBF; 
            --selected-color: #B794F4;
            --success-green: #2ED573;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #3c236e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: row;
            gap: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-section { flex: 1; display: flex; justify-content: center; align-items: center; }

        .board-container {
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid var(--mellow-light-purple);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 55px);
            grid-template-rows: repeat(9, 55px);
            background-color: var(--mellow-deep-purple);
            gap: 1px;
            border: 3px solid var(--mellow-deep-purple);
        }

        .cell { background: white; position: relative; cursor: pointer; user-select: none; transition: background-color 0.1s; }
        .cell-value { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #2D3748; z-index: 2; }
        .memo-grid { position: absolute; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 2px; z-index: 1; }
        .memo-digit { font-size: 10px; color: #718096; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .cell.border-right-thick { border-right: 3px solid var(--mellow-deep-purple); }
        .cell.border-bottom-thick { border-bottom: 3px solid var(--mellow-deep-purple); }
        .cell.cross-hl { background-color: var(--highlight-cross); }
        .cell.match-hl { background-color: var(--highlight-match) !important; }
        .cell.selected { background-color: var(--selected-color) !important; }
        .cell.selected .cell-value { color: white !important; }
        .cell.fixed { background: #FAF5FF; }
        .cell.fixed .cell-value { color: var(--mellow-deep-purple); }
        .cell.error { background-color: #FFF5F5; }
        .cell.error .cell-value { color: #E53E3E !important; }

        .control-panel { width: 380px; display: flex; flex-direction: column; }
        .header-logo { color: var(--mellow-light-purple); font-size: 26px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 12px rgba(214, 188, 250, 0.4); letter-spacing: 1px; }
        .stats-bar { display: flex; justify-content: space-between; color: #E9D8FD; font-size: 18px; margin-bottom: 25px; border-bottom: 1px solid rgba(214, 188, 250, 0.2); padding-bottom: 10px; }
        .action-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; color: var(--mellow-light-purple); cursor: pointer; font-size: 13px; }
        .action-btn i { background: rgba(214, 188, 250, 0.1); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 5px; border: 1px solid rgba(214, 188, 250, 0.2); }
        .action-btn:hover i, .action-btn.active i { background: var(--mellow-deep-purple); color: white; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .num-btn { background: rgba(214, 188, 250, 0.15); border: 1px solid rgba(214, 188, 250, 0.2); height: 70px; border-radius: 10px; color: #E9D8FD; font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.15s; }
        .num-btn:hover { background: var(--mellow-deep-purple); color: white; }
        .num-btn.completed { background: var(--success-green); color: white; }
        .bottom-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .new-game-btn, .rank-btn { flex: 1; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(107, 70, 193, 0.4); }
        .new-game-btn { background: linear-gradient(135deg, #B794F4 0%, var(--mellow-deep-purple) 100%); }
        .rank-btn { background: linear-gradient(135deg, #FFD700 0%, #D4AF37 100%); color: #1a102f; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #251842; border: 2px solid var(--mellow-light-purple); padding: 25px; border-radius: 15px; width: 100%; max-width: 480px; color: white; text-align: center; }
        .modal h2 { margin-top: 0; color: var(--mellow-yellow); font-size: 22px; }
        .rank-list { margin: 20px 0; text-align: left; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .rank-item:first-child { color: var(--mellow-yellow); font-weight: bold; }
        .rank-info { display: flex; gap: 10px; font-size: 13px; color: #cbd5e1; align-items: center; }
        .rank-time { color: #fff; font-weight: bold; }
        .close-btn { background: var(--mellow-deep-purple); border: none; color: white; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        @media (max-width: 850px) {
            body { padding: 8px; }
            .game-container { flex-direction: column; align-items: center; gap: 8px; padding: 10px; }
            .grid { grid-template-columns: repeat(9, min(45px, 9.8vw, 4.6vh)); grid-template-rows: repeat(9, min(45px, 9.8vw, 4.6vh)); }
            .control-panel { width: 100%; }
            .header-logo { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-section">
        <div class="board-container">
            <div class="grid" id="sudoku-grid"></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="header-logo">💫 MELLOW TV SUDOKU</div>
        
        <div class="stats-bar">
            <span>실수: <span id="mistake-count">0/3</span></span>
            <span>힌트: <span id="hint-stats">3/3</span></span>
            <span>시간: <span id="timer">00:00</span></span>
        </div>

        <div class="action-buttons">
            <div class="action-btn" onclick="eraseCell()"><i class="fa-solid fa-eraser"></i>지우기</div>
            <div class="action-btn" id="memo-toggle-btn" onclick="toggleMemo()"><i class="fa-solid fa-pencil"></i>메모 <span id="memo-status">OFF</span></div>
            <div class="action-btn" onclick="useHint()"><i class="fa-solid fa-lightbulb"></i>힌트</div>
            <div class="action-btn" onclick="resetBoard()"><i class="fa-solid fa-rotate"></i>초기화</div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
        </div>

        <div class="bottom-buttons">
            <button class="new-game-btn" onclick="startNewGame()">새 게임</button>
            <button class="rank-btn" onclick="showLeaderboard()">🏆 랭킹 보기</button>
        </div>
    </div>
</div>

<div id="rankModal" class="modal">
    <div class="modal-content">
        <h2>🏆 실시간 명예의 전당</h2>
        <div class="rank-list" id="rank-list-box"></div>
        <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    // [스크립트 내용은 이전과 동일하므로 전체 복사하세요]
    let board = [], currentSolution = [], selectedCell = null, memoMode = false, mistakes = 0, hintsLeft = 3, timerInterval = null, timeSeconds = 0;
    let audioCtx = null;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'memo') { osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, now); gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.08); osc.start(now); osc.stop(now + 0.08); }
        else if (type === 'correct') { osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.08); gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25); osc.start(now); osc.stop(now + 0.25); }
        else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(130.81, now); gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); }
        else if (type === 'clear') { const notes = [523.25, 659.25, 783.99, 1046.50]; notes.forEach((freq, i) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'sine'; o.frequency.setValueAtTime(freq, now + (i * 0.1)); g.gain.setValueAtTime(0.15, now + (i * 0.1)); g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.4); o.start(now + (i * 0.1)); o.stop(now + (i * 0.1) + 0.4); }); }
    }

    function generateSudoku() { const mat = Array.from(Array(9), () => Array(9).fill(0)); fillGrid(mat); currentSolution = mat.map(row => [...row]); const quiz = mat.map(row => [...row]); let count = 40; while(count > 0) { let i = Math.floor(Math.random()*9), j = Math.floor(Math.random()*9); if(quiz[i][j] !== 0) { quiz[i][j] = 0; count--; } } board = quiz; }
    function fillGrid(mat) { for (let i = 0; i < 81; i++) { let row = Math.floor(i/9), col = i%9; if(mat[row][col] === 0) { const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random()-0.5); for(let n of nums) { if(checkValid(mat, row, col, n)) { mat[row][col] = n; if(fillGrid(mat)) return true; mat[row][col] = 0; } } return false; } } return true; }
    function checkValid(mat, r, c, n) { for(let i=0; i<9; i++) if(mat[r][i] === n || mat[i][c] === n) return false; let sr = r - r%3, sc = c - c%3; for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(mat[i+sr][j+sc] === n) return false; return true; }
    function createGrid() { const gridEl = document.getElementById('sudoku-grid'); gridEl.innerHTML = ''; for(let r=0; r<9; r++) for(let c=0; c<9; c++) { const cell = document.createElement('div'); cell.classList.add('cell'); cell.dataset.row = r; cell.dataset.col = c; if(c==2||c==5) cell.classList.add('border-right-thick'); if(r==2||r==5) cell.classList.add('border-bottom-thick'); const val = board[r][c], valEl = document.createElement('div'); valEl.classList.add('cell-value'); if(val!==0) { valEl.innerText = val; cell.classList.add('fixed'); } cell.appendChild(valEl); const memoGrid = document.createElement('div'); memoGrid.classList.add('memo-grid'); for(let i=0; i<9; i++) { const md = document.createElement('div'); md.classList.add('memo-digit'); memoGrid.appendChild(md); } cell.appendChild(memoGrid); cell.onclick = () => selectCell(r, c, cell); gridEl.appendChild(cell); } }
    function selectCell(r, c, el) { selectedCell = {r, c, el}; const val = el.querySelector('.cell-value').innerText; document.querySelectorAll('.cell').forEach(e => { e.classList.remove('selected', 'cross-hl', 'match-hl'); const cr = parseInt(e.dataset.row), cc = parseInt(e.dataset.col), cv = e.querySelector('.cell-value').innerText; if(cr===r || cc===c) e.classList.add('cross-hl'); if(val!=="" && cv===val) e.classList.add('match-hl'); }); el.classList.add('selected'); }
    function inputNumber(num) { if(!selectedCell || selectedCell.el.classList.contains('fixed')) return; const {r, c, el} = selectedCell; if(memoMode) { playSound('memo'); const md = el.querySelectorAll('.memo-digit'); md[num-1].innerText = md[num-1].innerText ? '' : num; } else { const ve = el.querySelector('.cell-value'); if(currentSolution[r][c] === num) { playSound('correct'); board[r][c] = num; ve.innerText = num; el.classList.remove('error', 'selected'); el.classList.add('fixed'); el.querySelectorAll('.memo-digit').forEach(e => e.innerText = ''); updateNumpadCompletion(); checkGameClear(); } else { playSound('error'); el.classList.add('error'); ve.innerText = num; mistakes++; document.getElementById('mistake-count').innerText = `${mistakes}/3`; if(mistakes >= 3) { alert("게임 오버!"); startNewGame(); } } } }
    function eraseCell() { if(!selectedCell || selectedCell.el.classList.contains('fixed')) return; const {r,c,el} = selectedCell; board[r][c] = 0; el.querySelector('.cell-value').innerText = ''; el.querySelectorAll('.memo-digit').forEach(e => e.innerText = ''); el.classList.remove('error'); updateNumpadCompletion(); }
    function toggleMemo() { memoMode = !memoMode; document.getElementById('memo-status').innerText = memoMode ? 'ON' : 'OFF'; document.getElementById('memo-toggle-btn').classList.toggle('active', memoMode); }
    function useHint() { if(hintsLeft <= 0 || !selectedCell || selectedCell.el.classList.contains('fixed')) return; const {r,c,el} = selectedCell; playSound('correct'); board[r][c] = currentSolution[r][c]; el.querySelector('.cell-value').innerText = currentSolution[r][c]; el.classList.add('fixed'); el.classList.remove('error'); el.querySelectorAll('.memo-digit').forEach(e => e.innerText = ''); hintsLeft--; document.getElementById('hint-stats').innerText = `${hintsLeft}/3`; checkGameClear(); }
    function updateNumpadCompletion() { const counts = Array(10).fill(0); for(let r=0; r<9; r++) for(let c=0; c<9; c++) if(board[r][c]>=1 && board[r][c]<=9) counts[board[r][c]]++; document.querySelectorAll('.num-btn').forEach(b => { const n = parseInt(b.textContent); b.classList.toggle('completed', counts[n]===9); }); }
    function startTimer() { clearInterval(timerInterval); timeSeconds = 0; timerInterval = setInterval(() => { timeSeconds++; document.getElementById('timer').innerText = `${String(Math.floor(timeSeconds/60)).padStart(2,'0')}:${String(timeSeconds%60).padStart(2,'0')}`; }, 1000); }
    function checkGameClear() { for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(board[r][c]!==currentSolution[r][c]) return; clearInterval(timerInterval); playSound('clear'); setTimeout(() => { const name = prompt("축하합니다! 명예의 전당에 등록할 닉네임을 입력하세요:"); if(name && name.trim()) saveGameResult(name.trim(), timeSeconds); else alert("랭킹 등록 취소"); }, 500); }
    function startNewGame() { generateSudoku(); mistakes=0; hintsLeft=3; selectedCell=null; document.getElementById('mistake-count').innerText="0/3"; document.getElementById('hint-stats').innerText="3/3"; createGrid(); updateNumpadCompletion(); startTimer(); }
    function resetBoard() { startNewGame(); }

    const firebaseConfig = { apiKey: "AIzaSyCah6vX4Ci1hcjAlMa2o52gAWB6JFepNkk", authDomain: "mellowtvsudoku.firebaseapp.com", databaseURL: "https://mellowtvsudoku-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "mellowtvsudoku", storageBucket: "mellowtvsudoku.firebasestorage.app", messagingSenderId: "202358201862", appId: "1:202358201862:web:66a1ab591ce41607936d87" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function saveGameResult(name, time) { database.ref('ranking').push({name, time, date: Date.now()}).then(() => { alert("등록 완료!"); showLeaderboard(); }); }
    function showLeaderboard() { const rb = document.getElementById('rank-list-box'); rb.innerHTML = "로딩 중..."; document.getElementById('rankModal').style.display='flex'; database.ref('ranking').orderByChild('time').limitToFirst(10).once('value', s => { rb.innerHTML = ""; let r=1; s.forEach(cs => { const d = cs.val(); rb.innerHTML += `<div class='rank-item'><span>${r}등. ${d.name}</span><span>⏱️ ${String(Math.floor(d.time/60)).padStart(2,'0')}:${String(d.time%60).padStart(2,'0')}</span></div>`; r++; }); }); }
    function closeModal() { document.getElementById('rankModal').style.display='none'; }

    window.addEventListener('click', initAudio, { once: true });
    window.onload = startNewGame;
</script>
</body>
</html>
