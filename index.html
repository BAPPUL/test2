<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow TV Premium Sudoku</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #1a102f;
            --mellow-light-purple: #D6BCFA;
            --mellow-deep-purple: #6B46C1;
            --mellow-yellow: #FFD700;
            --highlight-cross: #F3E8FF; /* 가로세로 십자 하이라이트 색상 */
            --highlight-match: #FEFCBF; /* 같은 숫자 하이라이트 색상 */
            --selected-color: #B794F4;
            --success-green: #2ED573;
        }

        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #3c236e 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            width: 1100px;
            display: flex;
            gap: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board-container {
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid var(--mellow-light-purple);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 55px);
            grid-template-rows: repeat(9, 55px);
            background-color: var(--mellow-deep-purple);
            gap: 1px;
            border: 3px solid var(--mellow-deep-purple);
        }

        .cell {
            background: white;
            position: relative;
            width: 55px;
            height: 55px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.1s;
        }

        .cell-value {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #2D3748;
            z-index: 2;
        }

        .memo-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 2px;
            z-index: 1;
        }

        .memo-digit {
            font-size: 10px;
            color: #718096;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell.border-right-thick { border-right: 3px solid var(--mellow-deep-purple); }
        .cell.border-bottom-thick { border-bottom: 3px solid var(--mellow-deep-purple); }
        
        /* 하이라이트 스타일 */
        .cell.cross-hl { background-color: var(--highlight-cross); }
        .cell.match-hl { background-color: var(--highlight-match) !important; }
        .cell.selected { background-color: var(--selected-color) !important; }
        .cell.selected .cell-value { color: white !important; }
        .cell.fixed { background: #FAF5FF; }
        .cell.fixed .cell-value { color: var(--mellow-deep-purple); }
        .cell.error { background-color: #FFF5F5; }
        .cell.error .cell-value { color: #E53E3E !important; }

        .control-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
        }

        .header-logo {
            color: var(--mellow-light-purple);
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 12px rgba(214, 188, 250, 0.4);
            letter-spacing: 1px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            color: #E9D8FD;
            font-size: 18px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(214, 188, 250, 0.2);
            padding-bottom: 10px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--mellow-light-purple);
            cursor: pointer;
            font-size: 13px;
        }
        .action-btn i {
            background: rgba(214, 188, 250, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 5px;
            border: 1px solid rgba(214, 188, 250, 0.2);
        }
        .action-btn:hover i, .action-btn.active i { background: var(--mellow-deep-purple); color: white; }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .num-btn {
            background: rgba(214, 188, 250, 0.15);
            border: 1px solid rgba(214, 188, 250, 0.2);
            height: 70px;
            border-radius: 10px;
            color: #E9D8FD;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
        }
        .num-btn:hover { background: var(--mellow-deep-purple); color: white; }

        .bottom-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .new-game-btn, .rank-btn {
            flex: 1;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(107, 70, 193, 0.4);
        }
        .new-game-btn { background: linear-gradient(135deg, #B794F4 0%, var(--mellow-deep-purple) 100%); }
        .rank-btn { background: linear-gradient(135deg, #FFD700 0%, #D4AF37 100%); color: #1a102f; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #251842;
            border: 2px solid var(--mellow-light-purple);
            padding: 30px;
            border-radius: 15px;
            width: 480px;
            color: white;
            text-align: center;
            box-shadow: 0 0 30px rgba(214, 188, 250, 0.3);
        }
        .modal h2 { margin-top: 0; color: var(--mellow-yellow); }
        .rank-list { margin: 20px 0; text-align: left; max-height: 280px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .rank-item:first-child { color: var(--mellow-yellow); font-weight: bold; }
        .rank-info { display: flex; gap: 15px; font-size: 14px; color: #cbd5e1; }
        .rank-time { color: #fff; font-weight: bold; }
        .close-btn { background: var(--mellow-deep-purple); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-section">
        <div class="board-container">
            <div class="grid" id="sudoku-grid"></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="header-logo">💫 MELLOW TV SUDOKU</div>
        
        <div class="stats-bar">
            <span>실수: <span id="mistake-count">0/3</span></span>
            <span>힌트: <span id="hint-stats">3/3</span></span>
            <span>시간: <span id="timer">00:00</span></span>
        </div>

        <div class="action-buttons">
            <div class="action-btn" onclick="eraseCell()"><i class="fa-solid fa-eraser"></i>지우기</div>
            <div class="action-btn" id="memo-toggle-btn" onclick="toggleMemo()"><i class="fa-solid fa-pencil"></i>메모 <span id="memo-status">OFF</span></div>
            <div class="action-btn" onclick="useHint()"><i class="fa-solid fa-lightbulb"></i>힌트</div>
            <div class="action-btn" onclick="resetBoard()"><i class="fa-solid fa-rotate"></i>초기화</div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
        </div>

        <div class="bottom-buttons">
            <button class="new-game-btn" onclick="startNewGame()">새 게임</button>
            <button class="rank-btn" onclick="showLeaderboard()">🏆 랭킹 보기</button>
        </div>
    </div>
</div>

<div id="rankModal" class="modal">
    <div class="modal-content">
        <h2>🏆 실시간 명예의 전당</h2>
        <div class="rank-list" id="rank-list-box"></div>
        <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    let board = [];
    let solution = [];
    let selectedCell = null;
    let memoMode = false;
    let mistakes = 0;
    let hintsLeft = 3;
    let timerInterval = null;
    let timeSeconds = 0;

    // --- 🎲 랜덤 스도쿠 맵 생성 로직 ---
    const mapPool = [
        {
            quiz: [
                [9,0,0, 5,0,8, 0,0,7], [0,8,0, 3,0,2, 9,0,5], [2,5,4, 0,0,0, 0,8,0],
                [0,7,0, 6,8,0, 1,3,2], [1,0,2, 0,0,4, 0,0,8], [5,0,0, 2,1,9, 0,6,0],
                [7,0,0, 9,3,6, 0,0,1], [0,2,6, 0,0,1, 0,4,0], [0,0,1, 4,7,0, 0,5,6]
            ],
            sol: [
                [9,3,1, 5,2,8, 6,4,7], [6,8,7, 3,4,2, 9,1,5], [2,5,4, 1,9,7, 3,8,6],
                [4,7,9, 6,8,5, 1,3,2], [1,6,2, 7,3,4, 5,9,8], [5,3,8, 2,1,9, 7,6,4],
                [7,4,5, 9,3,6, 8,2,1], [3,2,6, 8,5,1, 7,4,9], [8,9,1, 4,7,3, 2,5,6]
            ]
        },
        {
            quiz: [
                [0,0,0, 2,6,0, 7,0,1], [6,8,0, 0,7,0, 0,9,0], [1,9,0, 0,0,4, 5,0,0],
                [8,2,0, 1,0,0, 0,4,0], [0,0,4, 6,0,2, 9,0,0], [0,5,0, 0,0,3, 0,2,8],
                [0,0,9, 3,0,0, 0,7,4], [0,4,0, 0,5,0, 0,3,6], [7,0,3, 0,1,8, 0,0,0]
            ],
            sol: [
                [4,3,5, 2,6,9, 7,8,1], [6,8,2, 5,7,1, 3,9,4], [1,9,7, 8,3,4, 5,6,2],
                [8,2,6, 1,9,5, 4,4,3], [3,7,4, 6,8,2, 9,1,5], [9,5,1, 7,4,3, 6,2,8],
                [5,1,9, 3,2,6, 8,7,4], [2,4,8, 9,5,7, 1,3,6], [7,6,3, 4,1,8, 2,5,9]
            ]
        }
    ];

    let currentQuiz = [];
    let currentSolution = [];

    function createGrid() {
        const gridEl = document.getElementById('sudoku-grid');
        gridEl.innerHTML = '';
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = r;
                cell.dataset.col = c;
                if (c === 2 || c === 5) cell.classList.add('border-right-thick');
                if (r === 2 || r === 5) cell.classList.add('border-bottom-thick');
                
                const val = board[r][c];
                const valEl = document.createElement('div');
                valEl.classList.add('cell-value');
                if (val !== 0) {
                    valEl.innerText = val;
                    cell.classList.add('fixed');
                }
                cell.appendChild(valEl);

                const memoGrid = document.createElement('div');
                memoGrid.classList.add('memo-grid');
                for (let i = 0; i < 9; i++) {
                    const memoDigit = document.createElement('div');
                    memoDigit.classList.add('memo-digit');
                    memoGrid.appendChild(memoDigit);
                }
                cell.appendChild(memoGrid);

                cell.onclick = () => selectCell(r, c, cell);
                gridEl.appendChild(cell);
            }
        }
    }

    // --- ✨ 가로세로 십자 및 동일 숫자 실시간 하이라이트 함수 ---
    function selectCell(r, c, element) {
        selectedCell = { r, c, element };
        
        const clickedValue = element.querySelector('.cell-value').innerText;
        const allCells = document.querySelectorAll('.cell');

        allCells.forEach(el => {
            el.classList.remove('selected', 'cross-hl', 'match-hl');
            
            const cellRow = parseInt(el.dataset.row);
            const cellCol = parseInt(el.dataset.col);
            const cellValue = el.querySelector('.cell-value').innerText;

            // 1. 가로세로 십자 하이라이트 표시
            if (cellRow === r || cellCol === c) {
                el.classList.add('cross-hl');
            }

            // 2. 판에 입력된 숫자 중 누른 숫자와 동일한 숫자 모두 표시
            if (clickedValue !== "" && cellValue === clickedValue) {
                el.classList.add('match-hl');
            }
        });

        element.classList.add('selected');
    }

    function inputNumber(num) {
        if (!selectedCell || selectedCell.element.classList.contains('fixed')) return;
        const { r, c, element } = selectedCell;

        if (memoMode) {
            const memoDigits = element.querySelectorAll('.memo-digit');
            const target = memoDigits[num - 1];
            target.innerText = target.innerText ? '' : num;
        } else {
            const valEl = element.querySelector('.cell-value');
            if (currentSolution[r][c] === num) {
                board[r][c] = num;
                valEl.innerText = num;
                element.classList.remove('error');
                
                // 숫자 채운 후 실시간 하이라이트 상태 동기화 재선택
                selectCell(r, c, element);
                checkGameClear();
            } else {
                element.classList.add('error');
                valEl.innerText = num;
                mistakes++;
                document.getElementById('mistake-count').innerText = `${mistakes}/3`;
                if (mistakes >= 3) {
                    alert("게임 오버! 실수를 3회 하였습니다.");
                    startNewGame();
                }
            }
        }
    }

    function eraseCell() {
        if (!selectedCell || selectedCell.element.classList.contains('fixed')) return;
        const { r, c, element } = selectedCell;
        board[r][c] = 0;
        element.querySelector('.cell-value').innerText = '';
        element.querySelectorAll('.memo-digit').forEach(el => el.innerText = '');
        element.classList.remove('error');
        selectCell(r, c, element);
    }

    function toggleMemo() {
        memoMode = !memoMode;
        document.getElementById('memo-status').innerText = memoMode ? 'ON' : 'OFF';
        document.getElementById('memo-toggle-btn').classList.toggle('active', memoMode);
    }

    function useHint() {
        if (hintsLeft <= 0 || !selectedCell || selectedCell.element.classList.contains('fixed')) return;
        const { r, c, element } = selectedCell;
        const correctVal = currentSolution[r][c];
        board[r][c] = correctVal;
        element.querySelector('.cell-value').innerText = correctVal;
        element.classList.add('fixed');
        element.classList.remove('error');
        hintsLeft--;
        document.getElementById('hint-stats').innerText = `${hintsLeft}/3`;
        selectCell(r, c, element);
        checkGameClear();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeSeconds = 0;
        timerInterval = setInterval(() => {
            timeSeconds++;
            const min = String(Math.floor(timeSeconds / 60)).padStart(2, '0');
            const sec = String(timeSeconds % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${min}:${sec}`;
        }, 1000);
    }

    function checkGameClear() {
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                if (board[r][c] !== currentSolution[r][c]) return;
            }
        }
        clearInterval(timerInterval);
        
        setTimeout(() => {
            const isConfirm = confirm("🎉 축하합니다! 스도쿠를 클리어했습니다!\n\n실시간 명예의 전당에 등록하시겠습니까?");
            if (isConfirm) {
                const badWords = ["씨발", "시발", "개새끼", "병신", "존나", "좆"];
                let nickname = "";

                while (true) {
                    nickname = prompt("명예의 전당에 등록할 닉네임을 입력하세요 (공백 및 비속어 포함 금지):");
                    if (nickname === null) {
                        alert("랭킹 등록이 취소되었습니다.");
                        return;
                    }
                    const trimmedName = nickname.trim();
                    if (!trimmedName) {
                        alert("닉네임을 공백 제외 최소 1글자 이상 입력해 주세요!");
                        continue;
                    }
                    const hasBadWord = badWords.some(bad => trimmedName.includes(bad));
                    if (hasBadWord) {
                        alert("비속어가 포함된 닉네임은 등록할 수 없습니다.");
                        continue;
                    }
                    saveGameResult(trimmedName, timeSeconds);
                    break;
                }
            } else {
                alert("랭킹 등록을 하지 않았습니다.");
            }
        }, 500);
    }

    function startNewGame() {
        // 무작위 맵 풀 매칭 연산
        const randomMap = mapPool[Math.floor(Math.random() * mapPool.length)];
        currentQuiz = randomMap.quiz;
        currentSolution = randomMap.sol;

        board = JSON.parse(JSON.stringify(currentQuiz));
        mistakes = 0;
        hintsLeft = 3;
        selectedCell = null;
        document.getElementById('mistake-count').innerText = "0/3";
        document.getElementById('hint-stats').innerText = "3/3";
        createGrid();
        startTimer();
    }

    function resetBoard() {
        startNewGame();
    }

    // --- Firebase 설정 파트 ---
    const firebaseConfig = {
        apiKey: "AIzaSyCah6vX4Ci1hcjAlMa2o52gAWB6JFepNkk",
        authDomain: "mellowtvsudoku.firebaseapp.com",
        databaseURL: "https://mellowtvsudoku-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mellowtvsudoku",
        storageBucket: "mellowtvsudoku.firebasestorage.app",
        messagingSenderId: "202358201862",
        appId: "1:202358201862:web:66a1ab591ce41607936d87",
        measurementId: "G-6FDJ8F6GVF"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function saveGameResult(nickname, clearTime) {
        database.ref('ranking').push({
            name: nickname,
            time: clearTime,
            date: Date.now()
        }).then(() => {
            alert("🏆 명예의 전당에 성공적으로 등록되었습니다!");
            showLeaderboard();
        }).catch(err => {
            console.error(err);
            alert("저장에 실패했습니다.");
        });
    }

    function showLeaderboard() {
        const rankBox = document.getElementById('rank-list-box');
        rankBox.innerHTML = "<div style='text-align:center; padding:20px;'>실시간 데이터 로딩 중...</div>";
        document.getElementById('rankModal').style.display = 'flex';

        database.ref('ranking').orderByChild('time').limitToFirst(10).once('value', (snapshot) => {
            rankBox.innerHTML = "";
            let rank = 1;
            
            if (!snapshot.exists()) {
                rankBox.innerHTML = "<div style='text-align:center; padding:20px; color:#aaa;'>등록된 랭킹 기록이 없습니다.</div>";
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                const min = String(Math.floor(data.time / 60)).padStart(2, '0');
                const sec = String(data.time % 60).padStart(2, '0');
                
                let dateString = "";
                if (data.date) {
                    const d = new Date(data.date);
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const date = String(d.getDate()).padStart(2, '0');
                    const hours = String(d.getHours()).padStart(2, '0');
                    const minutes = String(d.getMinutes()).padStart(2, '0');
                    dateString = `(${month}/${date} ${hours}:${minutes})`;
                }

                rankBox.innerHTML += `
                    <div class="rank-item">
                        <span><strong>${rank}등</strong>. ${data.name}</span>
                        <div class="rank-info">
                            <span class="rank-time">⏱️ ${min}:${sec}</span>
                            <span style="color: #94a3b8; font-size:12px;">${dateString}</span>
                        </div>
                    </div>
                `;
                rank++;
            });
        });
    }

    function closeModal() {
        document.getElementById('rankModal').style.display = 'none';
    }

    window.onload = startNewGame;
</script>
</body>
</html>
